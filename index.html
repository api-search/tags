---
layout: default
meta_title: "Tags | APIs.io"
meta_description: "Browse APIs, capabilities, and schemas by tag. Explore the most popular tags across the APIs.io network."
---

<style>
  .page-hero { text-align: center; padding: 2rem 0 1.5rem; }
  .page-hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .page-hero p { color: #666; margin-bottom: 1.5rem; }
  .filter-bar { max-width: 960px; margin: 0 auto 1.5rem; }
  .tag-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; max-width: 960px; margin: 0 auto; justify-content: center; }
  .tag-pill { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: white; border: 1px solid #e3e7ee; border-radius: 999px; text-decoration: none; color: #1a1a2e; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
  .tag-pill:hover { border-color: #0d6efd; background: #0d6efd; color: white; transform: translateY(-1px); }
  .tag-pill:hover .tag-count { background: rgba(255,255,255,0.3); color: white; }
  .tag-count { background: #eef2f7; padding: 0.15em 0.5em; border-radius: 999px; font-size: 0.75rem; font-weight: 600; color: #6c757d; transition: all 0.15s; }
</style>

<div class="page-hero">
  <h1>Tags</h1>
  <p id="tag-summary">Loading tags from across the APIs.io network...</p>
  <div class="filter-bar">
    <input type="text" class="form-control" id="tag-filter" placeholder="Filter tags..." style="max-width: 400px; margin: 0 auto;">
  </div>
</div>

<div class="tag-grid" id="tag-grid">
  <span style="color: #aaa; font-size: 0.85rem;">Loading tags...</span>
</div>

<script>
(function() {
  var INDEXES = [
    'https://providers.apis.io/search-index.json',
    'https://apis.apis.io/search-index.json',
    'https://capabilities.apis.io/search-index.json',
    'https://schemas.apis.io/search-index.json',
    'https://asyncapi.apis.io/search-index.json',
    'https://json-ld.apis.io/search-index.json',
    'https://rules.apis.io/search-index.json'
  ];

  Promise.all(INDEXES.map(function(url) {
    return fetch(url).then(function(r) { return r.json(); }).catch(function() { return []; });
  })).then(function(results) {
    var allData = [].concat.apply([], results);
    var counts = {};
    for (var i = 0; i < allData.length; i++) {
      var tags = allData[i].t || [];
      for (var t = 0; t < tags.length; t++) {
        if (tags[t]) counts[tags[t]] = (counts[tags[t]] || 0) + 1;
      }
    }
    var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });

    document.getElementById('tag-summary').innerHTML =
      '<strong>' + sorted.length + '</strong> tags across <strong>' + allData.length + '</strong> items';

    var html = '';
    sorted.forEach(function(tag) {
      var safe = tag.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      html += '<a href="https://apis.io/?search=' + encodeURIComponent(tag) + '" class="tag-pill" data-name="' + safe.toLowerCase() + '">';
      html += safe + ' <span class="tag-count">' + counts[tag] + '</span></a>';
    });
    document.getElementById('tag-grid').innerHTML = html;

    document.getElementById('tag-filter').addEventListener('input', function() {
      var q = this.value.toLowerCase();
      document.querySelectorAll('.tag-pill').forEach(function(el) {
        el.style.display = el.getAttribute('data-name').indexOf(q) !== -1 ? '' : 'none';
      });
    });
  });
})();
</script>
